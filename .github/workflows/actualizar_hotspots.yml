name: Actualizar hotspots VIIRS

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: actualizar-hotspots-viirs
  cancel-in-progress: true

env:
  SUOMI_VIIRS_KML_24H: "https://firms.modaps.eosdis.nasa.gov/data/active_fire/suomi-npp-viirs-c2/kml/SUOMI_VIIRS_C2_Europe_24h.kml"
  J1_VIIRS_KML_24H: "https://firms.modaps.eosdis.nasa.gov/data/active_fire/noaa-20-viirs-c2/kml/J1_VIIRS_C2_Europe_24h.kml"
  J2_VIIRS_KML_24H: "https://firms.modaps.eosdis.nasa.gov/data/active_fire/noaa-21-viirs-c2/kml/J2_VIIRS_C2_Europe_24h.kml"

  SUOMI_VIIRS_KML_48H: "https://firms.modaps.eosdis.nasa.gov/data/active_fire/suomi-npp-viirs-c2/kml/SUOMI_VIIRS_C2_Europe_48h.kml"
  J1_VIIRS_KML_48H: "https://firms.modaps.eosdis.nasa.gov/data/active_fire/noaa-20-viirs-c2/kml/J1_VIIRS_C2_Europe_48h.kml"
  J2_VIIRS_KML_48H: "https://firms.modaps.eosdis.nasa.gov/data/active_fire/noaa-21-viirs-c2/kml/J2_VIIRS_C2_Europe_48h.kml"

  SUOMI_VIIRS_ZIP_7D: "https://firms.modaps.eosdis.nasa.gov/data/active_fire/suomi-npp-viirs-c2/shapes/zips/SUOMI_VIIRS_C2_Europe_7d.zip"
  J1_VIIRS_ZIP_7D: "https://firms.modaps.eosdis.nasa.gov/data/active_fire/noaa-20-viirs-c2/shapes/zips/J1_VIIRS_C2_Europe_7d.zip"
  J2_VIIRS_ZIP_7D: "https://firms.modaps.eosdis.nasa.gov/data/active_fire/noaa-21-viirs-c2/shapes/zips/J2_VIIRS_C2_Europe_7d.zip"

  CV_BBOX: "-1.60,37.80,0.80,40.90"

jobs:
  actualizar-hotspots:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pyshp shapely

      - name: Descargar hotspots VIIRS y generar GeoJSON
        run: python scripts/actualizar_hotspots_viirs.py

      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add datos/hotspots
          git commit -m "Actualizar hotspots VIIRS multi-satelite" || echo "Sin cambios"
          git push
